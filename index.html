<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="BAUS SCREAM 官方主页">
    <title>BAUS SCREAM | http://.BausScreAm.com</title>
    <style>
        /* ================= 基础重置与变量 ================= */
        :root {
            --bg: #0b0c10;
            --card: #151720;
            --border: #2a2d3a;
            --text-main: #e6e6e6;
            --text-sub: #8b92a5;
            --accent: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.4);
            --strike: #ff6b6b;
            --font: system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: var(--font);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ================= 背景动态网格 ================= */
        .bg-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(108, 92, 231, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(108, 92, 231, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            animation: gridMove 20s linear infinite;
        }
        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(40px); }
        }

        /* ================= 导航与提示 ================= */
        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(11, 12, 16, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }
        .domain-tag {
            font-size: 12px;
            color: var(--text-sub);
            letter-spacing: 1px;
            opacity: 0.7;
        }
        .scroll-hint {
            font-size: 13px;
            color: var(--accent);
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .scroll-hint:hover { opacity: 0.7; }

        /* ================= 英雄区 (标题+ZIP) ================= */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px 40px;
            text-align: center;
        }
        .title-strike {
            font-size: clamp(36px, 8vw, 72px);
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-decoration: line-through;
            text-decoration-color: var(--strike);
            text-decoration-thickness: 4px;
            margin-bottom: 30px;
            animation: fadeInDown 0.8s ease-out;
        }
        .zip-wrapper {
            position: relative;
            width: 140px;
            height: 160px;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            transition: transform 0.3s, box-shadow 0.3s;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }
        .zip-wrapper:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px var(--accent-glow);
        }
        /* 纯CSS绘制ZIP图标 */
        .zip-icon {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, #ff9f43, #ff6b6b);
            border-radius: 8px;
            position: relative;
        }
        .zip-icon::after {
            content: "ZIP";
            position: absolute;
            bottom: -20px; left: 50%; transform: translateX(-50%);
            font-size: 14px; font-weight: 700; color: var(--text-sub);
            letter-spacing: 2px;
        }
        .zip-label {
            font-size: 12px;
            color: var(--text-sub);
            margin-top: 24px;
            background: rgba(255,255,255,0.05);
            padding: 4px 10px;
            border-radius: 20px;
        }

        /* ================= 基础设定区 ================= */
        .settings-section {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 24px 100px;
        }
        .section-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 30px;
            padding-left: 12px;
            border-left: 4px solid var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .info-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
        }
        .info-card:hover {
            border-color: var(--accent);
            background: #1a1d2a;
        }
        .info-label {
            font-size: 13px;
            color: var(--text-sub);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .info-value {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-main);
        }

        /* B站UID图片占位区 */
        .bilibili-box {
            background: var(--card);
            border: 1px dashed var(--border);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            margin-top: 20px;
        }
        .bilibili-box img {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 16px;
            display: block;
        }
        .uid-text {
            font-family: monospace;
            background: rgba(108, 92, 231, 0.15);
            color: var(--accent);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
            letter-spacing: 1px;
        }

        /* ================= 底部AI提示 ================= */
        .ai-footer {
            text-align: center;
            padding: 40px 20px;
            border-top: 1px solid var(--border);
            margin-top: 60px;
        }
        .ai-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(90deg, rgba(255,107,107,0.1), rgba(108,92,231,0.1));
            border: 1px solid rgba(255,107,107,0.3);
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 14px;
            color: #ff9f9f;
            font-weight: 500;
        }
        .ai-badge::before {
            content: "⚡";
            font-size: 16px;
        }

        /* ================= 动画 ================= */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ================= 响应式 ================= */
        @media (max-width: 600px) {
            .title-strike { font-size: 32px; }
            .info-grid { grid-template-columns: 1fr; }
            .top-bar { padding: 12px 16px; }
        }
    </style>
</head>
